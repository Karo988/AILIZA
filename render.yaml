services:
  - type: web
    name: ailiza-backend
    runtime: python
    buildCommand: pip install -r apps/backend/requirements-core.txt
    startCommand: uvicorn apps.backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AILIZA_EXTERNAL_LLM_ENABLED
        value: "false"
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    healthCheckPath: /health
