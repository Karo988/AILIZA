services:
  - type: web
    name: ailiza-backend
    runtime: python
    rootDir: apps/backend
    buildCommand: pip install -r requirements-core.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AILIZA_EXTERNAL_LLM_ENABLED
        value: "false"
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AILIZA_ALLOWED_ORIGINS
        sync: false
