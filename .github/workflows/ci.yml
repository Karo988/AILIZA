name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AILIZA_DATABASE_URL: "sqlite:///:memory:"
      AILIZA_EXTERNAL_LLM_ENABLED: "false"
      AILIZA_DEFAULT_TENANT_ID: default
      SECRET_KEY: ci-test-secret-key-not-for-production

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/backend/requirements-core.txt

      - name: Abhängigkeiten installieren
        run: pip install -r apps/backend/requirements-core.txt pytest pytest-asyncio httpx

      - name: Tests (Root)
        run: pytest tests/ -v --tb=short

      - name: Tests (Backend)
        run: pytest apps/backend/tests/ -v --tb=short
