name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AILIZA_DATABASE_URL: "sqlite:///:memory:"
      AILIZA_EXTERNAL_LLM_ENABLED: "false"
      AILIZA_DEFAULT_TENANT_ID: default
      SECRET_KEY: ci-test-secret-key-not-for-production

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/backend/requirements-core.txt

      - name: Abhängigkeiten installieren
        run: pip install -r apps/backend/requirements-core.txt pytest pytest-asyncio httpx bcrypt pyotp python-jose[cryptography]

      - name: Tests (Root)
        run: pytest tests/ -v --tb=short

      # apps/backend/tests/ ist verwaist (kaputte Imports auf nicht mehr
      # existierende Module: compliance_auditor, KillSwitch, policy_engine,
      # policies.pii_taxonomy, governance, main, require_operator).
      # Aktive Test-Suite ist ausschliesslich tests/ (siehe Schritt oben).
      # Deaktiviert statt geloescht -- separates Aufraeumen folgt spaeter.
      # - name: Tests (Backend, verwaist -- vorerst deaktiviert)
      #   run: PYTHONPATH=. pytest apps/backend/tests/ -v --tb=short
